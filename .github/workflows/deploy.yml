name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material pykakasi mkdocs-ruby-plugin

      - name: Patch mkdocs-ruby-plugin regex
        run: python scripts/patch-ruby-plugin.py

      - name: Add furigana to kanji
        run: python scripts/add-furigana.py docs/

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Commit annotated files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: auto-add furigana annotations"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
